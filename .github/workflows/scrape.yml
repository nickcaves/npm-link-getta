name: Weekly scrape & resolve

on:
  schedule:
    # Saturday 06:00 AEST (Friday 20:00 UTC)
    - cron: "0 20 * * 5"
  workflow_dispatch:
    inputs:
      npr_url:
        description: "NPR New Music Friday URL (optional; leave blank to auto-discover from RSS)"
        required: false
        type: string

env:
  SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
  SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}

jobs:
  scrape-and-resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Discover latest NPR New Music Friday URL
        id: discover
        run: echo "url=$(node scripts/discover-npr-url.js)" >> $GITHUB_OUTPUT

      - name: Scrape NPR
        run: |
          NPR_URL="${{ inputs.npr_url || steps.discover.outputs.url }}"
          echo "Using URL: $NPR_URL"
          npm run scrape -- --url "$NPR_URL"

      # Order matters: resolve reads albums.json → build reads albums-with-links.json
      - name: Resolve links (Spotify + Songlink)
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: npm run resolve

      - name: Resolve debug log
        if: always()
        run: |
          echo "--- resolve-debug.log ---"
          cat resolve-debug.log 2>/dev/null || echo "(no log file)"

      - name: Embed data for site
        run: npm run build

      - name: Debug changed files before auto-commit
        if: always()
        run: |
          echo "=== git status --porcelain ==="
          git status --porcelain
          echo "=== git diff --name-only (targeted) ==="
          git diff --name-only -- data/albums.json data/albums-with-links.json data/albums-data.js || true
          echo "=== scrapedAt values ==="
          node -e "
            try {
              const fs = require('fs');
              const a = JSON.parse(fs.readFileSync('data/albums.json', 'utf8'));
              const b = JSON.parse(fs.readFileSync('data/albums-with-links.json', 'utf8'));
              const js = fs.readFileSync('data/albums-data.js', 'utf8');
              console.log('albums.json scrapedAt=' + a.scrapedAt);
              console.log('albums-with-links scrapedAt=' + b.scrapedAt);
              console.log('albums-data.js includes scrapedAt=' + js.includes(a.scrapedAt));
            } catch (e) {
              console.error('debug scrapedAt read failed:', e && e.message ? e.message : String(e));
            }
          "

      - name: Verify all data files are in sync
        run: |
          node -e "
            const fs = require('fs');
            const a = JSON.parse(fs.readFileSync('data/albums.json', 'utf8'));
            const b = JSON.parse(fs.readFileSync('data/albums-with-links.json', 'utf8'));
            const js = fs.readFileSync('data/albums-data.js', 'utf8');
            const scrapedAt = a.scrapedAt;
            if (b.scrapedAt !== scrapedAt) {
              console.error('::error::albums-with-links.json out of sync. Resolve step may have failed.');
              process.exit(1);
            }
            if (!js.includes(scrapedAt)) {
              console.error('::error::albums-data.js missing scrapedAt. Embed step may have failed.');
              process.exit(1);
            }
            console.log('Data files in sync (scrapedAt=' + scrapedAt + ')');
          "

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update albums from NPR New Music Friday"
          file_pattern: |
            data/albums.json
            data/albums-with-links.json
            data/albums-data.js
